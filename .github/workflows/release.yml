# =============================================================================
# .github/workflows/release.yml
# Release automatique sur tag vX.Y.Z
# =============================================================================
name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - name: Build release ROM
        run: |
          docker run --rm \
            --entrypoint /bin/bash \
            --user "$(id -u):$(id -g)" \
            -v "${{ github.workspace }}:/src" \
            -w /src \
            -e ROM_VERSION="${{ steps.version.outputs.VERSION }}" \
            zerasul/sgdk:2.00 \
            -c "
              make -f \$GDK/makefile.gen clean
              make -f \$GDK/makefile.gen \
                EXTRA_CFLAGS='-O2' \
                EXTRA_DEF='-DROM_VERSION=\\\"\$ROM_VERSION\\\"'
            "
          # Rename avec version
          cp out/rom.bin "out/rom-${{ steps.version.outputs.VERSION }}.bin"

      - name: Generate ROM info
        run: |
          SIZE=$(stat -c%s "out/rom-${{ steps.version.outputs.VERSION }}.bin")
          echo "## ROM Info" >> release_notes.md
          echo "" >> release_notes.md
          echo "| | |" >> release_notes.md
          echo "|---|---|" >> release_notes.md
          echo "| Version | ${{ steps.version.outputs.VERSION }} |" >> release_notes.md
          echo "| Size | $(echo "scale=1; $SIZE/1024" | bc) KB |" >> release_notes.md
          echo "| SHA256 | \`$(sha256sum "out/rom-${{ steps.version.outputs.VERSION }}.bin" | cut -d' ' -f1)\` |" >> release_notes.md
          echo "| Commit | \`${{ github.sha }}\` |" >> release_notes.md
          cat release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "${{ steps.version.outputs.VERSION }}"
          body_path: release_notes.md
          draft: false
          prerelease: ${{ contains(steps.version.outputs.VERSION, '-') }}
          files: |
            out/rom-${{ steps.version.outputs.VERSION }}.bin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
