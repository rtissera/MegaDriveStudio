# =============================================================================
# .github/workflows/release.yml
# Release automatique sur tag vX.Y.Z
# Bundles: sample ROM, VS Code extensions, mds-mcp Rust binary,
# vendored libra + clownmdemu-libretro core, tools/dump_vram.
# =============================================================================
name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout (recursive)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      # ── Sample ROM (SGDK) ───────────────────────────────────────────────────
      - name: Build release ROM
        run: |
          docker run --rm \
            --entrypoint /bin/bash \
            --user "$(id -u):$(id -g)" \
            -v "${{ github.workspace }}:/src" \
            -w /src \
            -e ROM_VERSION="${{ steps.version.outputs.VERSION }}" \
            zerasul/sgdk:2.00 \
            -c "
              make -f \$GDK/makefile.gen clean
              make -f \$GDK/makefile.gen \
                EXTRA_CFLAGS='-O2' \
                EXTRA_DEF='-DROM_VERSION=\\\"\$ROM_VERSION\\\"'
            "
          cp out/rom.bin "out/rom-${{ steps.version.outputs.VERSION }}.bin"

      # ── Build deps ──────────────────────────────────────────────────────────
      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build pkg-config \
            clang libclang-dev

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node 20 (for vsce)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── Vendor: libra (static) + clownmdemu-libretro core ──────────────────
      - name: Build clownmdemu_libretro.so
        working-directory: vendor/clownmdemu-libretro
        run: make -j"$(nproc)"

      - name: Configure + build libra (static, tests off)
        run: |
          cmake -S vendor/libra -B vendor/libra/build \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=OFF \
            -DBUILD_TESTS=OFF \
            -G Ninja
          cmake --build vendor/libra/build -j"$(nproc)"

      # ── mds-mcp Rust binary ─────────────────────────────────────────────────
      - name: Build mds-mcp (release)
        working-directory: mds-mcp
        run: cargo build --release

      - name: Stage mds-mcp binary with version suffix
        run: |
          mkdir -p dist
          cp mds-mcp/target/release/mds-mcp \
             "dist/mds-mcp-${{ steps.version.outputs.VERSION }}-linux-x64"
          chmod +x "dist/mds-mcp-${{ steps.version.outputs.VERSION }}-linux-x64"

      # ── tools/dump_vram (M0 utility) ────────────────────────────────────────
      - name: Build dump_vram
        working-directory: tools
        run: make

      - name: Stage dump_vram with version suffix
        run: |
          cp tools/dump_vram \
             "dist/dump_vram-${{ steps.version.outputs.VERSION }}-linux-x64"
          chmod +x "dist/dump_vram-${{ steps.version.outputs.VERSION }}-linux-x64"

      # ── VS Code extensions ──────────────────────────────────────────────────
      - name: Build extension pack .vsix
        if: hashFiles('extensions/megadrive-studio-pack/package.json') != ''
        working-directory: extensions/megadrive-studio-pack
        run: npx -y @vscode/vsce@latest package --no-dependencies --allow-missing-repository

      - name: Build native extension .vsix
        if: hashFiles('extensions/megadrive-studio/package.json') != ''
        working-directory: extensions/megadrive-studio
        run: |
          npm ci || npm install
          npm run compile
          npx -y @vscode/vsce@latest package --no-dependencies --allow-missing-repository

      # ── Stage vendored libretro core for download ──────────────────────────
      # liblibra.a is intentionally NOT shipped: it's statically linked into
      # mds-mcp at build time. Distributing the archive separately is dead
      # weight — only useful to someone building their own libretro frontend,
      # who'd be cloning the repo anyway. Attribution stays in LICENSES/.
      - name: Stage clownmdemu libretro core
        run: |
          cp vendor/clownmdemu-libretro/clownmdemu_libretro.so \
             "dist/clownmdemu_libretro-${{ steps.version.outputs.VERSION }}-linux-x64.so"

      # ── Self-contained Linux x64 bundle (VSCodium + ext + binaries) ────────
      - name: Resolve latest VSCodium Linux x64 tarball
        id: vscodium
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Latest stable VSCodium release; pick the linux-x64 (non-musl,
          # non-arm, non-reh) tarball.
          INFO=$(gh release view --repo VSCodium/vscodium \
            --json tagName,assets \
            -q '.tagName as $t
                | .assets[]
                | select(.name | test("^VSCodium-linux-x64-.*\\.tar\\.gz$"))
                | "\($t)\t\(.url)\t\(.name)"' | head -n1)
          TAG=$(echo "$INFO" | cut -f1)
          URL=$(echo "$INFO" | cut -f2)
          NAME=$(echo "$INFO" | cut -f3)
          echo "tag=$TAG"   >> "$GITHUB_OUTPUT"
          echo "url=$URL"   >> "$GITHUB_OUTPUT"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "Resolved VSCodium $TAG → $NAME"

      - name: Download VSCodium tarball
        run: |
          curl -L --fail \
            -o /tmp/vscodium.tar.gz \
            "${{ steps.vscodium.outputs.url }}"
          ls -lh /tmp/vscodium.tar.gz

      # ── Marsdev (m68k-elf toolchain + SGDK) ─────────────────────────────────
      # Inline the SGDK + m68k-elf cross-toolchain into the bundle so the
      # example project's Build task works without Docker. We pull the
      # andwn/marsdev v1.0.0-rc1 prebuilt linux-x86_64 release (GCC 13.1.0,
      # SGDK 1.81), keep only the m68k-elf tree (drop sh-elf 32X bits), and
      # strip aggressively. Runs ~190 MB on disk after pruning.
      - name: Download + extract marsdev (m68k-elf only)
        run: |
          set -euo pipefail
          curl -L --fail \
            -o /tmp/marsdev.tar.xz \
            https://github.com/andwn/marsdev/releases/download/v1.0.0-rc1/marsdev-v1.0.0-rc1-linux-x86_64.tar.xz
          mkdir -p /tmp/marsdev-extract
          # Only extract the m68k-elf subtree — sh-elf doubles the size and
          # we don't ship 32X support in the bundle.
          tar -xJf /tmp/marsdev.tar.xz -C /tmp/marsdev-extract \
            mars/m68k-elf
          mv /tmp/marsdev-extract/mars/m68k-elf /tmp/toolchain-stage
          rm -rf /tmp/marsdev-extract /tmp/marsdev.tar.xz
          du -sh /tmp/toolchain-stage

      - name: Strip + prune marsdev toolchain
        run: |
          set -euo pipefail
          # Strip ELF binaries (most are already stripped by the upstream
          # release, but belt-and-braces — `|| true` because non-ELF entries
          # in the same listing would otherwise abort the pipeline).
          find /tmp/toolchain-stage -type f -executable \
            -exec file {} \; 2>/dev/null \
            | grep ELF | grep -v stripped | cut -d: -f1 \
            | xargs -r strip --strip-unneeded 2>/dev/null || true
          # Drop docs/locales/info/man — the SGDK Discord, not the bundle,
          # is where homebrew users learn the toolchain.
          find /tmp/toolchain-stage \
            -type d \( -name doc -o -name info -o -name man -o -name locale \) \
            -exec rm -rf {} + 2>/dev/null || true
          # Drop GCC's bundled python (lto-dump introspection only).
          rm -rf /tmp/toolchain-stage/share/gcc-*/python || true
          # Drop the leftover out.lst from upstream's build (huge, useless).
          rm -f /tmp/toolchain-stage/out.lst
          du -sh /tmp/toolchain-stage
          du -sh /tmp/toolchain-stage/* | sort -h

      # ── Minimal JRE (rescomp/sizebnd need it) ───────────────────────────────
      # Build a jlink-stripped runtime from the runner's openjdk so the
      # bundle is fully self-contained. Targets ~55 MB.
      - name: Build minimal JRE for rescomp/sizebnd
        run: |
          set -euo pipefail
          sudo apt-get install -y --no-install-recommends openjdk-21-jdk-headless
          jlink \
            --add-modules java.base,java.desktop,java.logging,java.xml \
            --output /tmp/jre-min \
            --strip-debug --no-header-files --no-man-pages \
            --compress=2
          du -sh /tmp/jre-min
          /tmp/jre-min/bin/java -version

      - name: Assemble Linux bundle
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          set -euo pipefail
          BUNDLE=/tmp/mds-bundle/megadrive-studio
          mkdir -p "$BUNDLE"/{code,data/extensions,data/user,bin,examples,LICENSES}

          # 1. VSCodium tree (extracts flat into code/)
          tar -xzf /tmp/vscodium.tar.gz -C "$BUNDLE/code"

          # 2. Pre-install our two MIT extensions (and let VSCodium pull
          #    in whatever pack deps OpenVSX has).
          "$BUNDLE/code/bin/codium" \
            --user-data-dir /tmp/mds-bundle-user \
            --extensions-dir "$BUNDLE/data/extensions" \
            --install-extension extensions/megadrive-studio-pack/megadrive-studio-pack-*.vsix \
            --install-extension extensions/megadrive-studio/megadrive-studio-*.vsix \
            --force

          # 3. Native binaries. liblibra is statically linked into mds-mcp
          #    so we don't ship it separately.
          cp mds-mcp/target/release/mds-mcp                       "$BUNDLE/bin/"
          cp tools/dump_vram                                       "$BUNDLE/bin/"
          cp vendor/clownmdemu-libretro/clownmdemu_libretro.so     "$BUNDLE/bin/"
          chmod 0755 "$BUNDLE/bin/mds-mcp" "$BUNDLE/bin/dump_vram"

          # 4. Sample ROM (the same one that goes to the release).
          cp out/rom.bin "$BUNDLE/examples/rom.bin" || \
            echo "(no out/rom.bin — bundle ships without examples/rom.bin)"

          # 4b. Example project (so VSCodium opens onto a real homebrew
          #     project, not a blank editor). Copies the in-repo skeleton
          #     and overwrites the committed prebuilt ROM with the
          #     freshly-built one from step 4.
          cp -r examples/hello-world "$BUNDLE/examples/hello-world"
          mkdir -p "$BUNDLE/examples/hello-world/out"
          cp out/rom.bin "$BUNDLE/examples/hello-world/out/rom.bin" || true

          # 4c. SGDK + m68k-elf toolchain + minimal JRE.
          #     Lets the example's Build task run natively, no Docker.
          mkdir -p "$BUNDLE/toolchain"
          cp -a /tmp/toolchain-stage "$BUNDLE/toolchain/sgdk"
          cp -a /tmp/jre-min         "$BUNDLE/toolchain/jre"

          # 5. Licenses.
          cp mds-mcp/LICENSE                                       "$BUNDLE/LICENSES/MDS-MIT.txt"
          cp "$BUNDLE/code/resources/app/LICENSE.txt"              "$BUNDLE/LICENSES/VSCodium-MIT.txt"
          cp vendor/libra/LICENSE                                  "$BUNDLE/LICENSES/libra-MIT.txt"
          cp vendor/clownmdemu-libretro/LICENCE.txt                "$BUNDLE/LICENSES/clownmdemu-AGPL.txt"
          # SGDK is MIT (Stephane Dallongeville). The toolchain bundles its
          # license as a plain text file at the SGDK tree root.
          # SGDK ships its license as `license.txt` (lowercase) at the
          # repo root; the marsdev tarball doesn't include it, so we curl
          # it from upstream. Fail loud if curl returns nothing useful —
          # an empty/404 SGDK-MIT.txt is a license-compliance bug.
          if [ -f "$BUNDLE/toolchain/sgdk/license.txt" ]; then
            cp "$BUNDLE/toolchain/sgdk/license.txt"               "$BUNDLE/LICENSES/SGDK-MIT.txt"
          else
            curl -sSfL https://raw.githubusercontent.com/Stephane-D/SGDK/master/license.txt \
              -o "$BUNDLE/LICENSES/SGDK-MIT.txt"
          fi
          if [ "$(wc -c < "$BUNDLE/LICENSES/SGDK-MIT.txt")" -lt 100 ]; then
            echo "SGDK-MIT.txt looks bogus (too small)" >&2
            exit 1
          fi
          # The m68k-elf cross-toolchain is GCC + binutils — GPL-3.0 (with
          # the libgcc runtime exception). We're redistributing unmodified
          # binaries from the upstream marsdev release.
          curl -sSL https://www.gnu.org/licenses/gpl-3.0.txt \
            -o "$BUNDLE/LICENSES/m68k-elf-toolchain-GPL3.txt" || true

          CORE_SHA=$(git -C vendor/clownmdemu-libretro rev-parse HEAD)
          cat > "$BUNDLE/LICENSES/README.txt" <<EOF
          Megadrive Studio $VERSION — Linux x64 bundle
          Third-party licenses summary
          ============================

          1. Megadrive Studio (this project)            — MIT  (MDS-MIT.txt)
             megadrive-studio + megadrive-studio-pack extensions, mds-mcp,
             dump_vram. https://github.com/rtissera/MegaDriveStudio
          2. VSCodium (code/)                           — MIT  (VSCodium-MIT.txt)
             https://github.com/VSCodium/vscodium
             Chromium third-party notices: code/LICENSES.chromium.html
          3. libra (vendored static lib)                — MIT  (libra-MIT.txt)
             https://github.com/rtissera/libra
          4. clownmdemu_libretro.so (loaded dynamically)
                                                — AGPL-3.0-or-later  (clownmdemu-AGPL.txt)
             https://github.com/rtissera/clownmdemu-libretro
             Vendored commit: ${CORE_SHA}
             Loaded at runtime via dlopen (RetroArch-style libretro core).
             Binary corresponds 1:1 to the source tree at the SHA above.
          5. SGDK 2.x (toolchain/sgdk/, headers + libmd.a + tools)
                                                — MIT  (SGDK-MIT.txt)
             https://github.com/Stephane-D/SGDK
             Shipped via the andwn/marsdev v1.0.0-rc1 release. Used by the
             example project's Build task (make -f \$GDK/makefile.gen).
          6. m68k-elf cross-toolchain (toolchain/sgdk/bin/m68k-elf-*,
             toolchain/sgdk/m68k-elf/, toolchain/sgdk/lib/, toolchain/sgdk/libexec/)
                                                — GPL-3.0  (m68k-elf-toolchain-GPL3.txt)
             GCC 13.1.0 + binutils, with the GCC Runtime Library Exception
             for libgcc — code linked through libgcc into your ROM stays
             unencumbered. Source: https://gcc.gnu.org/, https://www.gnu.org/software/binutils/
             Redistributed unmodified from the andwn/marsdev v1.0.0-rc1
             release: https://github.com/andwn/marsdev/releases/tag/v1.0.0-rc1
          7. OpenJDK 21 minimal runtime (toolchain/jre/)
                                                — GPL-2.0 with Classpath Exception
             jlink-stripped subset of Eclipse Temurin / Ubuntu OpenJDK 21
             (java.base + java.desktop + java.logging + java.xml). Needed by
             rescomp.jar / sizebnd.jar / xgmtool. Source:
             https://openjdk.org/projects/jdk/21/
          EOF

          # 6. start.sh + README.txt.
          cat > "$BUNDLE/start.sh" <<'EOF'
          #!/usr/bin/env bash
          set -euo pipefail
          HERE="$(cd "$(dirname "$0")" && pwd)"

          # Bundle binaries (mds-mcp, dump_vram, clownmdemu core)
          export MDS_MCP="$HERE/bin/mds-mcp"
          export MDS_CORE="$HERE/bin/clownmdemu_libretro.so"
          export PATH="$HERE/bin:$PATH"

          # SGDK + m68k-elf toolchain — used by the example's Build task.
          # The toolchain ships SGDK at toolchain/sgdk/ with m68k-elf-*
          # cross binaries inside toolchain/sgdk/bin/. The minimal JRE under
          # toolchain/jre/ powers rescomp.jar / sizebnd.jar / xgmtool.
          if [ -d "$HERE/toolchain/sgdk" ]; then
              export GDK="$HERE/toolchain/sgdk"
              # SGDK's makefile.gen also accepts MARSDEV pointing at the
              # toolchain root in some configurations — set it for parity.
              export MARSDEV="$HERE/toolchain"
              export PATH="$HERE/toolchain/sgdk/bin:$PATH"
          fi
          if [ -d "$HERE/toolchain/jre" ]; then
              export JAVA_HOME="$HERE/toolchain/jre"
              export PATH="$HERE/toolchain/jre/bin:$PATH"
          fi

          if [ "$#" -gt 0 ] && [ -e "$1" ]; then
              OPEN_PATH="$1"
              shift
          elif [ -d "$HERE/examples/hello-world" ]; then
              # Default: open the turnkey example project so the user
              # lands in a real homebrew workspace with a prebuilt ROM
              # at examples/hello-world/out/rom.bin.
              OPEN_PATH="$HERE/examples/hello-world"
          else
              OPEN_PATH="$HERE"
          fi
          exec "$HERE/code/bin/codium" \
              --user-data-dir "$HERE/data/user" \
              --extensions-dir "$HERE/data/extensions" \
              "$OPEN_PATH" \
              "$@"
          EOF
          chmod 0755 "$BUNDLE/start.sh"

          cat > "$BUNDLE/README.txt" <<EOF
          Megadrive Studio $VERSION — Linux x64 bundle
          ============================================

          Run:    ./start.sh
          That's it. A private VSCodium with the Megadrive Studio
          extensions opens onto the turnkey example project at
          examples/hello-world/. Nothing is installed system-wide.

          The example workspace ships with a prebuilt ROM at
          examples/hello-world/out/rom.bin so the Sega activity bar
          (VRAM/CRAM/sprites/regs/breakpoints) lights up immediately.
          Hit Ctrl+Shift+B to rebuild the ROM natively — the bundle
          ships SGDK 2.x + m68k-elf cross-toolchain + a minimal JRE,
          NO Docker needed, NO apt installs, NO toolchain hunt.
          See examples/hello-world/README.md for the 5-step quickstart.

          To open a different folder:  ./start.sh /path/to/project

          Layout:
            start.sh                          launcher (sets GDK, MARSDEV, PATH)
            code/                             private VSCodium
            data/extensions/                  pre-installed extensions
            data/user/                        isolated editor settings
            bin/mds-mcp                       MCP server (on \$PATH inside)
            bin/dump_vram                     headless VRAM dump
            bin/clownmdemu_libretro.so        libretro core (AGPL)
            toolchain/sgdk/                   SGDK 2.x tree + m68k-elf-gcc cross
                                              (\$GDK points here at runtime)
            toolchain/jre/                    minimal JRE 21 for rescomp/sizebnd
            examples/rom.bin                  standalone sample ROM
            examples/hello-world/             default workspace (homebrew skeleton)
              ├── src/main.c                  SGDK 2.x source
              ├── res/                        SGDK rescomp inputs
              ├── out/rom.bin                 prebuilt ROM, ready to load
              ├── Makefile                    SGDK passthrough (bundle-aware)
              └── .vscode/                    Build/Debug tasks (native, no Docker)
            LICENSES/                         third-party license texts

          Working from a system VS Code instead of start.sh? Source the
          env first:
            source <(./start.sh --print-env)   (not implemented yet — set
            GDK=\$PWD/toolchain/sgdk and prepend toolchain/sgdk/bin +
            toolchain/jre/bin to PATH manually).

          Some Microsoft-only extensions in the pack are not on
          OpenVSX (cpptools, claude-vscode); see LICENSES/README.txt
          for alternatives.
          EOF

          # 7. Tar it up.
          mkdir -p dist
          tar -czf "dist/megadrive-studio-$VERSION-linux-x64.tar.gz" \
            -C /tmp/mds-bundle megadrive-studio
          ls -lh "dist/megadrive-studio-$VERSION-linux-x64.tar.gz"
          du -sh "$BUNDLE"

      # ── Release notes ───────────────────────────────────────────────────────
      - name: Generate release notes
        run: |
          ROM="out/rom-${{ steps.version.outputs.VERSION }}.bin"
          MCP="dist/mds-mcp-${{ steps.version.outputs.VERSION }}-linux-x64"
          CORE="dist/clownmdemu_libretro-${{ steps.version.outputs.VERSION }}-linux-x64.so"
          LIBRA_SHA=$(git -C vendor/libra rev-parse --short HEAD)
          CORE_SHA=$(git -C vendor/clownmdemu-libretro rev-parse --short HEAD)

          {
            echo "# Megadrive Studio ${{ steps.version.outputs.VERSION }}"
            echo
            echo "## Artifacts"
            echo
            echo "| File | Size | SHA256 |"
            echo "|---|---|---|"
            for f in "$ROM" "$MCP" "$CORE" \
                     dist/dump_vram-*-linux-x64 \
                     extensions/megadrive-studio-pack/*.vsix \
                     extensions/megadrive-studio/*.vsix; do
              [ -f "$f" ] || continue
              SIZE=$(stat -c%s "$f")
              KB=$(echo "scale=1; $SIZE/1024" | bc)
              SHA=$(sha256sum "$f" | cut -d' ' -f1)
              NAME=$(basename "$f")
              echo "| \`$NAME\` | ${KB} KB | \`${SHA}\` |"
            done
            echo
            echo "## Vendored components"
            echo
            echo "- \`libra\` @ \`$LIBRA_SHA\` (rtissera/libra, MIT)"
            echo "- \`clownmdemu-libretro\` @ \`$CORE_SHA\` (rtissera/clownmdemu-libretro, AGPL-3.0 — fork of Clownacy/clownmdemu-libretro with custom retro_get_memory_data IDs)"
            echo
            echo "## How to test"
            echo
            echo "### VS Code IDE"
            echo "\`\`\`"
            echo "code --install-extension megadrive-studio-pack-*.vsix"
            echo "code --install-extension megadrive-studio-*.vsix"
            echo "\`\`\`"
            echo "Then open any folder in VS Code and look for the **Sega** activity bar icon."
            echo
            echo "### MCP server (standalone)"
            echo "\`\`\`"
            echo "chmod +x mds-mcp-*-linux-x64"
            echo "./mds-mcp-*-linux-x64 --help"
            echo "./mds-mcp-*-linux-x64 --sse 28765 --core ./clownmdemu_libretro-*-linux-x64.so"
            echo "\`\`\`"
            echo "Then point Claude Desktop or any MCP client at \`sse://127.0.0.1:28765\`."
            echo
            echo "### M0 spike (headless VRAM dump)"
            echo "\`\`\`"
            echo "chmod +x dump_vram-*-linux-x64"
            echo "./dump_vram-*-linux-x64 path/to/rom.bin vram.bin"
            echo "\`\`\`"
            echo
            echo "## Build provenance"
            echo
            echo "- Tag: \`${{ steps.version.outputs.VERSION }}\`"
            echo "- Commit: \`${{ github.sha }}\`"
            echo "- Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          } > release_notes.md
          cat release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "${{ steps.version.outputs.VERSION }}"
          body_path: release_notes.md
          draft: false
          prerelease: ${{ contains(steps.version.outputs.VERSION, '-') }}
          files: |
            out/rom-${{ steps.version.outputs.VERSION }}.bin
            dist/mds-mcp-${{ steps.version.outputs.VERSION }}-linux-x64
            dist/dump_vram-${{ steps.version.outputs.VERSION }}-linux-x64
            dist/clownmdemu_libretro-${{ steps.version.outputs.VERSION }}-linux-x64.so
            dist/megadrive-studio-${{ steps.version.outputs.VERSION }}-linux-x64.tar.gz
            extensions/megadrive-studio-pack/*.vsix
            extensions/megadrive-studio/*.vsix
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
